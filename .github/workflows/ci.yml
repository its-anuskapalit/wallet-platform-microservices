name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore WalletPlatform.slnx

      - name: Build
        run: dotnet build WalletPlatform.slnx -c Release --no-restore

      - name: Test
        run: dotnet test WalletPlatform.slnx -c Release --no-build --verbosity minimal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/wallet-platform/package-lock.json

      - name: Install and build
        working-directory: frontend/wallet-platform
        run: |
          npm ci
          npm run build
